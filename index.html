<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList - A User Friendly Tool.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>To-Do List</h1>
            <img src="img/book.jpg" alt="todo-pic">
        </div>
        <div class="addItems">
            <input id ="inputText" type="text" placeholder="Add your tasks">
            <button class="btn">Add</button>
            <p id="errorMsg"></p>
            <ul class="tasks">
            </ul>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
